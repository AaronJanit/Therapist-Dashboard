<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareSpace - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</head>
<body class="auth-page">
    <nav class="top-nav">        <div class="top-nav-brand"><a href="https://manchesterholisticcentres.co.uk/" target="_blank"><img src="Whole Person Manchester Holistic centres.png" alt="CBT Therapy Manchester logo"></a></div>        <ul class="nav-links">
            <li><a href="login.html" class="nav-link active">Login</a></li>
            <li><a href="signup.html" class="nav-link">Sign Up</a></li>
        </ul>
    </nav>
    <div class="login-container">
        <div class="login-form">
            <p>Therapist Dashboard Login</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <div id="login-error" class="error-message" style="display: none;"></div>
            <p style="margin-top: 20px; font-size: 14px;">Don't have an account? <a href="signup.html" style="color: var(--primary);">Sign up here</a></p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        // Clear stale database cache that may have old schema
        if (document.location.pathname.includes('login.html')) {
            const storedDb = localStorage.getItem('carespace_db');
            if (storedDb) {
                try {
                    const parsed = JSON.parse(storedDb);
                    console.log('Cached database exists, will validate schema on init');
                } catch (e) {
                    console.log('Invalid cache, clearing');
                    localStorage.removeItem('carespace_db');
                }
            }
        }
        
        console.log('login.html test script running');
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded: Form check started');
            const form = document.getElementById('login-form');
            console.log('Form element:', form ? 'found' : 'NOT FOUND');
        });
    </script>
</body>
</html>
