<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareSpace - Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</head>
<body class="auth-page">
    <nav class="top-nav">        <div class="top-nav-brand"><a href="https://manchesterholisticcentres.co.uk/" target="_blank"><img src="Whole Person Manchester Holistic centres.png" alt="CBT Therapy Manchester logo"></a></div>        <ul class="nav-links">
            <li><a href="login.html" class="nav-link">Login</a></li>
            <li><a href="signup.html" class="nav-link active">Sign Up</a></li>
        </ul>
    </nav>
    <div class="login-container">
        <div class="login-form">
            <p>Create Your Therapist Account</p>
            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-full-name">Full Name</label>
                    <input type="text" id="signup-full-name" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="form-group">
                    <label for="signup-username">Username</label>
                    <input type="text" id="signup-username" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required>
                </div>
                <div class="form-group">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <input type="password" id="signup-confirm-password" required>
                </div>
                <div class="form-group">
                    <label for="signup-role">Role</label>
                    <select id="signup-role" required>
                        <option value="Therapist">Therapist</option>
                        <option value="Masseur">Masseur</option>
                        <option value="Admin">Admin</option>
                        <option value="Receptionist">Receptionist</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
            <div id="signup-error" class="error-message" style="display: none;"></div>
            <p style="margin-top: 20px; font-size: 14px;">Already have an account? <a href="login.html" style="color: var(--primary);">Log in here</a></p>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        console.log('signup.html test script running');
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded: Form check started');
            const form = document.getElementById('signup-form');
            console.log('Form element:', form ? 'found' : 'NOT FOUND');
        });
    </script>
</body>
</html>
